name: Crear EXE prueba 5 SmartCharts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "smartcharts-test/**"
      - ".github/workflows/build-smartcharts-test.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: smartcharts-test

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Limpiar lock privado e instalar dependencias completas
        shell: powershell
        run: |
          if (Test-Path package-lock.json) {
            Remove-Item package-lock.json -Force
          }
          npm config set registry https://registry.npmjs.org/
          npm install --include=dev --legacy-peer-deps

      - name: Verificar herramientas de compilación
        run: |
          npx webpack --version
          npx electron-builder --version

      - name: Crear EXE portable
        run: npm run pack:win

      - name: Subir EXE
        uses: actions/upload-artifact@v4
        with:
          name: Deriv-5-Graficos-SmartCharts-Test
          path: smartcharts-test/dist/*.exe
          if-no-files-found: error
