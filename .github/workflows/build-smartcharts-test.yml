name: Crear EXE prueba 5 SmartCharts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "smartcharts-test/**"
      - ".github/workflows/build-smartcharts-test.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: smartcharts-test

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: smartcharts-test/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Crear EXE portable
        run: npm run pack:win

      - name: Subir EXE
        uses: actions/upload-artifact@v4
        with:
          name: Deriv-5-Graficos-SmartCharts-Test
          path: smartcharts-test/dist/*.exe
          if-no-files-found: error
